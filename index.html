<!DOCTYPE html>
<html lang="vi">
<head>

<!-- Tên hiển thị khi bookmark / add to home screen -->
<meta name="application-name" content="Tồn kho">
<meta name="apple-mobile-web-app-title" content="Tồn kho">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --bg-elev: #1e293b;
    --bg-card: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #fbbf24;
    --accent-hover: #f59e0b;
    --ok: #10b981;
    --warn: #ef4444;
    --info: #3b82f6;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px; line-height: 1.45; min-height: 100vh; }
  .header { position: sticky; top: 0; z-index: 10;
    background: var(--bg); padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border); }
  .title { font-size: 18px; font-weight: 700; margin: 0 0 10px;
    display: flex; align-items: center; gap: 10px; }
  .title .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); transition: background .3s; }
  .title .dot.ok { background: var(--ok); }
  .title .dot.warn { background: var(--warn); }
  .search-row { display: flex; gap: 8px; }
  .input { flex: 1; padding: 14px 14px; font-size: 17px;
    background: var(--bg-elev); color: var(--text);
    border: 2px solid var(--border); border-radius: var(--radius);
    outline: none; transition: border-color .15s; text-transform: uppercase; }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text-dim); text-transform: none; }
  .btn-scan { width: 52px; height: 52px; flex-shrink: 0;
    background: var(--accent); color: #1a1a1a; border: none;
    border-radius: var(--radius); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; }
  .btn-scan:active { background: var(--accent-hover); }
  .meta { padding: 8px 16px; font-size: 12px; color: var(--text-dim);
    display: flex; justify-content: space-between; align-items: center; }
  .btn-refresh { background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: 4px 10px; border-radius: 8px;
    font-size: 12px; cursor: pointer; }
  .btn-refresh:active { background: var(--bg-elev); }
  .content { padding: 8px 16px 80px; }
  .status { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .status.loading::after { content: ""; display: inline-block; width: 14px; height: 14px;
    margin-left: 8px; border: 2px solid var(--text-dim);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .summary { background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    margin-bottom: 10px; font-size: 14px; }
  .summary .badge { display: inline-block; padding: 2px 8px; border-radius: 6px;
    background: var(--accent); color: #1a1a1a; font-weight: 700;
    font-size: 12px; margin-right: 6px; }
  .summary .key { color: var(--accent); font-weight: 700; }
  .summary .total { color: var(--ok); font-weight: 700; }
  .summary .total.warn { color: var(--warn); }
  .summary .total.info { color: var(--info); }

  /* Mã không tồn tại MARA */
  .not-exist { background: var(--bg-elev); border: 1px solid var(--warn);
    border-radius: var(--radius); padding: 20px 16px; margin-bottom: 10px;
    text-align: center; }
  .not-exist .icon { font-size: 38px; margin-bottom: 8px; }
  .not-exist .head { font-size: 17px; font-weight: 700; color: var(--warn); margin-bottom: 6px; }
  .not-exist .code { font-family: monospace; font-size: 16px; color: var(--accent);
    background: var(--bg); padding: 4px 10px; border-radius: 6px; display: inline-block;
    margin: 6px 0; }
  .not-exist .hint { font-size: 13px; color: var(--text-dim); margin-top: 6px; }

  .card { background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .card.free-loc { border-color: var(--info); }
  .card-head { display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; gap: 10px; }
  .card-primary { font-size: 18px; font-weight: 700; color: var(--accent); word-break: break-all; }
  .card-primary.free { color: var(--info); }
  .card-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px;
    background: var(--bg-card); color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0; }
  .card-tag.tp { background: #064e3b; color: #6ee7b7; }
  .card-tag.nvl { background: #1e3a8a; color: #93c5fd; }
  .card-tag.free { background: #1e40af; color: #bfdbfe; }
  .card-tag.bom { background: #4c1d95; color: #c4b5fd; }
  .card-name { font-size: 14px; color: var(--text); margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
  .field { font-size: 13px; }
  .field .label { display: block; color: var(--text-dim);
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  .field .value { color: var(--text); font-weight: 600; word-break: break-all; }
  .field .value.qty { color: var(--ok); font-size: 16px; }
  .field .value.info { color: var(--info); font-size: 16px; }
  /* Hiển thị nhiều batch trong cùng 1 card (cùng BIN + cùng mã SAP) */
  .batch-list { margin-top: 4px; display: flex; flex-direction: column; gap: 6px; }
  .batch-row { display: flex; justify-content: space-between; align-items: center;
    gap: 10px; padding: 8px 10px; background: var(--bg); border-radius: 8px;
    border: 1px solid var(--border); }
  .batch-row .batch-code { font-family: monospace; font-size: 13px;
    color: var(--text); font-weight: 600; }
  .batch-row .batch-code.empty { color: var(--text-dim); font-style: italic; font-weight: 400; }
  .batch-row .batch-qty { color: var(--ok); font-weight: 700; font-size: 15px;
    white-space: nowrap; }
  .batch-total { display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
    font-size: 13px; }
  .batch-total .label { color: var(--text-dim); text-transform: uppercase;
    letter-spacing: .5px; font-size: 11px; }
  .batch-total .value { color: var(--ok); font-weight: 700; font-size: 16px; }

  /* Section BOM lookup */
  .section-head { display: flex; align-items: center; gap: 8px;
    margin: 18px 0 8px; padding: 0 2px; }
  .section-head .section-title { font-size: 13px; font-weight: 700;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: .6px; }
  .section-head .section-count { font-size: 11px; color: var(--text-dim);
    background: var(--bg-elev); padding: 2px 8px; border-radius: 6px; }

  /* BOM compact list */
  .bom-card { background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .bom-row { display: flex; justify-content: space-between; align-items: center;
    gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--border); cursor: pointer; }
  .bom-row:last-child { border-bottom: none; }
  .bom-row:active { opacity: .6; }
  .bom-row .bom-info { flex: 1; min-width: 0; }
  .bom-row .bom-code { font-family: monospace; font-size: 14px;
    color: var(--accent); font-weight: 700; word-break: break-all; }
  .bom-row .bom-name { font-size: 12px; color: var(--text-dim);
    margin-top: 2px; word-break: break-word; }
  .bom-row .bom-qty { color: var(--ok); font-weight: 700; font-size: 13px;
    white-space: nowrap; text-align: right; }
  .bom-row .bom-qty .ref { display: block; font-size: 10px; color: var(--text-dim);
    font-weight: 400; margin-top: 1px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--text-dim); }
  .empty .icon { font-size: 40px; margin-bottom: 10px; opacity: .5; }
  .modal { position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 100; display: none; flex-direction: column; }
  .modal.open { display: flex; }
  .modal-head { padding: 14px; display: flex; justify-content: space-between; align-items: center;
    color: white; font-weight: 600; }
  .modal-close { background: none; border: none; color: white;
    font-size: 28px; cursor: pointer; padding: 0 8px; }
  #reader { flex: 1; }
  /* Override style khung quét của html5-qrcode để to và đẹp hơn */
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
  #reader__scan_region { background: transparent !important; }
  .modal-foot { padding: 14px; display: flex; justify-content: space-between; align-items: center;
    color: white; gap: 12px; }
  .modal-hint { flex: 1; text-align: center; font-size: 13px; opacity: .9; }
  .torch-btn { display: none; width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,.15); color: white; border: 2px solid rgba(255,255,255,.4);
    font-size: 20px; cursor: pointer; align-items: center; justify-content: center; }
  .torch-btn.on { background: var(--accent); color: #1a1a1a; border-color: var(--accent); }

  /* Banner hiển thị thông tin quét */
  .scan-info {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--bg-elev);
    border: 1px solid var(--accent);
    border-radius: 10px;
    font-size: 12px;
    color: var(--text);
    display: none;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
    animation: slideDown .25s ease-out;
  }
  .scan-info.show { display: flex; }
  .scan-info-label { color: var(--text-dim); margin-right: 4px; }
  .scan-info-orig {
    color: var(--text-dim); font-family: monospace;
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
    text-decoration: line-through; opacity: .7;
  }
  .scan-info-arrow { color: var(--accent); font-weight: 700; margin: 0 2px; }
  .scan-info-code {
    color: var(--accent); font-family: monospace; font-weight: 700;
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
  }
  @keyframes slideDown {
    from { transform: translateY(-4px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* Lịch sử tra cứu */
  .meta-actions { display: flex; gap: 6px; }
  .btn-history { background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: 4px 10px; border-radius: 8px;
    font-size: 12px; cursor: pointer; }
  .btn-history:active { background: var(--bg-elev); }
  .history-modal { position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 100; display: none; align-items: flex-end; }
  .history-modal.open { display: flex; }
  .history-sheet { background: var(--bg); width: 100%; max-height: 85vh;
    border-radius: 18px 18px 0 0; display: flex; flex-direction: column;
    animation: slideUp .25s ease-out; }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .history-head { padding: 16px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); }
  .history-title { font-size: 17px; font-weight: 700; }
  .history-close { background: none; border: none; color: var(--text);
    font-size: 28px; cursor: pointer; padding: 0 8px; line-height: 1; }
  .history-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .history-item { padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .history-item:active { background: var(--bg-elev); }
  .history-info { flex: 1; min-width: 0; }
  .history-code { font-size: 16px; font-weight: 600; color: var(--accent);
    font-family: monospace; word-break: break-all; }
  .history-meta-row { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .history-result-found { color: var(--ok); }
  .history-result-none { color: var(--warn); }
  .history-arrow { color: var(--text-dim); font-size: 18px; flex-shrink: 0; }
  .history-empty { text-align: center; padding: 40px 20px; color: var(--text-dim); }
  .history-empty .icon { font-size: 40px; margin-bottom: 10px; opacity: .5; }
  .history-foot { padding: 12px 16px; border-top: 1px solid var(--border); }
  .btn-clear-history { width: 100%; padding: 12px; background: transparent;
    color: var(--warn); border: 1px solid var(--warn); border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-clear-history:active { background: rgba(239,68,68,.15); }
  .btn-clear-history:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <h1 class="title"><span class="dot" id="statusDot"></span>Tra cứu tồn kho</h1>
  <div class="search-row">
    <input id="searchInput" class="input" type="text" inputmode="text"
           placeholder="Nhập BIN hoặc mã SAP..." autocomplete="off" autocorrect="off" autocapitalize="characters">
    <button class="btn-scan" id="scanBtn" aria-label="Quét mã">📷</button>
  </div>
</div>

<div class="meta">
  <span id="metaText">Đang tải dữ liệu...</span>
  <div class="meta-actions">
    <button class="btn-history" id="historyBtn">🕐 Lịch sử</button>
    <button class="btn-refresh" id="refreshBtn">↻ Làm mới</button>
  </div>
</div>

<div class="content" id="content">
  <div class="status loading">Đang tải dữ liệu</div>
</div>

<div class="history-modal" id="historyModal">
  <div class="history-sheet">
    <div class="history-head">
      <span class="history-title">Lịch sử tra cứu</span>
      <button class="history-close" id="closeHistory" aria-label="Đóng">×</button>
    </div>
    <div class="history-list" id="historyList"></div>
    <div class="history-foot">
      <button class="btn-clear-history" id="clearHistoryBtn">Xóa toàn bộ lịch sử</button>
    </div>
  </div>
</div>

<div class="modal" id="scanModal">
  <div class="modal-head">
    <span>Quét mã BIN / SAP</span>
    <button class="modal-close" id="closeScan">×</button>
  </div>
  <div id="reader"></div>
  <div class="modal-foot">
    <div class="modal-hint">Đưa mã vạch / QR vào khung hình</div>
    <button class="torch-btn" id="torchBtn" aria-label="Đèn pin">🔦</button>
  </div>
</div>

<script>
/* =========================================================
   File JSON đặt cùng repo, đường dẫn tương đối
   ========================================================= */
const DATA_URL = "./ton-kho.json";
const CACHE_KEY = "ton_kho_cache_v3";   // bumped: structure mới có mara/mb52/bom
const CACHE_TTL_MS = 5 * 60 * 1000;
const HISTORY_KEY = "ton_kho_history_v1";
const HISTORY_MAX = 20;

let DATA = {
  nvl: [], tp: [], mara: [], mb52: [], bom: [],
  updated: null, loadedAt: null
};

// Index để tra cứu nhanh - rebuild mỗi lần load data
let IDX = {
  mara: new Map(),       // matnr -> { name, unit }
  mb52ByMat: new Map(),  // matnr -> [ {lgort, qty, block?, name, unit}, ... ]
  bomByTp: new Map(),    // tp -> [ bom rows ]
  bomByComp: new Map(),  // comp -> [ bom rows ]
};

const statusDot = document.getElementById("statusDot");
const metaText = document.getElementById("metaText");
const content = document.getElementById("content");

async function loadData(force = false) {
  if (!force) {
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
      if (cached && Date.now() - cached.loadedAt < CACHE_TTL_MS) {
        applyData(cached);
        const ts = cached.updated ? new Date(cached.updated) : new Date(cached.loadedAt);
        setStatus("ok", "Dữ liệu SAP: " + formatTime(ts) + " (cache)");
        renderInitial();
        return;
      }
    } catch (e) {}
  }

  setStatus("loading", "Đang tải dữ liệu...");
  content.innerHTML = '<div class="status loading">Đang tải dữ liệu</div>';

  try {
    // Thêm cache buster để chắc chắn lấy bản mới nhất
    const url = DATA_URL + "?t=" + Date.now();
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const json = await resp.json();

    const fresh = {
      nvl:  (json.nvl  || []).map(normalizeRow),
      tp:   (json.tp   || []).map(normalizeRow),
      mara: (json.mara || []).map(normalizeMara),
      mb52: (json.mb52 || []).map(normalizeMb52),
      bom:  (json.bom  || []).map(normalizeBom),
      updated: json.updated || null,
      loadedAt: Date.now(),
    };
    applyData(fresh);

    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(fresh));
    } catch (e) {
      // localStorage có thể đầy với JSON lớn. Bỏ qua, vẫn dùng được dữ liệu trong RAM
      console.warn("Cache write failed:", e.message);
    }

    const ts = DATA.updated ? new Date(DATA.updated) : new Date(DATA.loadedAt);
    setStatus("ok", "Dữ liệu SAP: " + formatTime(ts) +
      " · " + (DATA.nvl.length + DATA.tp.length) + " dòng kho");
    renderInitial();
  } catch (err) {
    setStatus("warn", "Lỗi tải dữ liệu");
    content.innerHTML = '<div class="empty"><div class="icon">❌</div>Không tải được dữ liệu.<br><small style="opacity:.7">' +
      err.message + '</small></div>';
  }
}

function applyData(d) {
  DATA = d;
  // Build index
  IDX.mara = new Map();
  for (const m of d.mara) IDX.mara.set(m.matnr, m);

  IDX.mb52ByMat = new Map();
  for (const r of d.mb52) {
    if (!IDX.mb52ByMat.has(r.matnr)) IDX.mb52ByMat.set(r.matnr, []);
    IDX.mb52ByMat.get(r.matnr).push(r);
  }

  IDX.bomByTp = new Map();
  IDX.bomByComp = new Map();
  for (const r of d.bom) {
    if (!IDX.bomByTp.has(r.tp)) IDX.bomByTp.set(r.tp, []);
    IDX.bomByTp.get(r.tp).push(r);
    if (!IDX.bomByComp.has(r.comp)) IDX.bomByComp.set(r.comp, []);
    IDX.bomByComp.get(r.comp).push(r);
  }
}

function normalizeRow(r) {
  return {
    bin: String(r.bin || "").trim().toUpperCase(),
    matnr: String(r.matnr || "").trim().toUpperCase(),
    name: String(r.name || "").trim(),
    batch: String(r.batch || "").trim(),
    qty: Number(r.qty) || 0,
    unit: String(r.unit || "").trim(),
  };
}

function normalizeMara(r) {
  return {

function setStatus(kind, text) {

function formatTime(d) {

}

/* =========================================================
   Search logic
   ========================================================= */
function search(query) {
  const q = query.trim().toUpperCase();
  if (!q) return null;

  const all = [
    ...DATA.nvl.map(r => ({ ...r, type: "NVL" })),
    ...DATA.tp.map(r => ({ ...r, type: "TP" })),
  ];

  // BIN khớp chính xác
  const binExact = all.filter(r => r.bin === q);
  if (binExact.length) return { mode: "BIN", key: q, rows: binExact };

  // Mã SAP khớp chính xác (có thể không có tồn nhưng vẫn có trong MARA)
  const matExact = all.filter(r => r.matnr === q);
  if (matExact.length) {
    return { mode: "MATNR", key: q, rows: matExact };
  }

  // Không có tồn nhưng có thể MARA có (mã hợp lệ, hết tồn)
  // hoặc MB52 có (tồn ở free location)
  if (IDX.mara.has(q) || IDX.mb52ByMat.has(q) || IDX.bomByTp.has(q) || IDX.bomByComp.has(q)) {
    return { mode: "MATNR", key: q, rows: [] };
  }

  // Tìm gần đúng theo prefix
  const binPrefix = all.filter(r => r.bin.startsWith(q));
  const matPrefix = all.filter(r => r.matnr.startsWith(q));

  if (binPrefix.length && !matPrefix.length) return { mode: "BIN_LIKE", key: q, rows: binPrefix };
  if (matPrefix.length && !binPrefix.length) return { mode: "MATNR_LIKE", key: q, rows: matPrefix };
  if (binPrefix.length || matPrefix.length) {
    return { mode: "MIXED", key: q, rows: [...binPrefix, ...matPrefix] };
  }

  // Tìm trong tên
  const inName = all.filter(r => r.name.toUpperCase().includes(q));
  if (inName.length) return { mode: "NAME", key: q, rows: inName };

  return { mode: "NONE", key: q, rows: [] };
}

function renderInitial() {
  content.innerHTML = '<div class="empty"><div class="icon">🔍</div>Nhập <b>số BIN</b> (vd: CK013-06-3) hoặc <b>mã SAP</b> (vd: L21210419013)<br><br>Hoặc nhấn 📷 để quét mã vạch</div>';
}

/* =========================================================
   Render result
   ========================================================= */
function renderResults(result) {
  if (!result) { renderInitial(); return; }
  addToHistory(result);

  if (result.mode === "NONE") {
    // Không có ở đâu cả → mã không tồn tại
    content.innerHTML = renderNotExist(result.key);
    return;
  }

  // Mã SAP: gom kết quả + so sánh MB52 + hiển thị BOM
  if (result.mode === "MATNR") {
    renderMatnrResult(result);
    return;
  }

  // BIN, BIN_LIKE, MATNR_LIKE, MIXED, NAME → render kiểu danh sách như cũ
  renderListResults(result);
}

function renderNotExist(key) {
  return `
    <div class="not-exist">
      <div class="icon">⚠️</div>
      <div class="head">Mã SAP không tồn tại</div>
      <div class="code">${escapeHtml(key)}</div>
      <div class="hint">Mã không có trong dữ liệu kho, MARA, MB52 và BOM.<br>
      Vui lòng kiểm tra lại mã đã nhập / đã quét.</div>
    </div>
  `;
}

function renderMatnrResult(result) {
  const key = result.key;
  const rows = result.rows;          // các dòng kho khớp matnr (có thể rỗng)

  // Master data
  const mara = IDX.mara.get(key);
  const mb52List = IDX.mb52ByMat.get(key) || [];
  const bomAsTp   = IDX.bomByTp.get(key)   || [];   // mã này là TP → list NVL của nó
  const bomAsComp = IDX.bomByComp.get(key) || [];   // mã này là NVL → list TP dùng nó

  // Nếu rỗng hoàn toàn ngoại trừ MARA → hiển thị "có trong master nhưng không có tồn"
  if (!mara && rows.length === 0 && mb52List.length === 0 &&
      bomAsTp.length === 0 && bomAsComp.length === 0) {
    content.innerHTML = renderNotExist(key);
    return;
  }

  // Tên + đơn vị: ưu tiên từ row tồn → MARA → MB52 → BOM
  let name = "", unit = "";
  if (rows.length) { name = rows[0].name; unit = rows[0].unit; }
  else if (mara)   { name = mara.name;    unit = mara.unit; }
  else if (mb52List.length) { name = mb52List[0].name; unit = mb52List[0].unit; }
  else if (bomAsTp.length)   { name = bomAsTp[0].tpName;   unit = ""; }
  else if (bomAsComp.length) { name = bomAsComp[0].compName; unit = bomAsComp[0].unit; }

  // Tổng tồn từ NVL+TP (theo dòng từ sheet kho)
  const totalBin = rows.reduce((s, r) => s + r.qty, 0);

  // Tổng tồn từ MB52 group theo LGORT
  // mb52List có thể có nhiều dòng cùng LGORT? thường mỗi LGORT 1 dòng nhưng vẫn safe
  const mb52ByLgort = new Map();
  for (const r of mb52List) {
    if (!mb52ByLgort.has(r.lgort)) {
      mb52ByLgort.set(r.lgort, { lgort: r.lgort, qty: 0, block: 0, unit: r.unit });
    }
    const g = mb52ByLgort.get(r.lgort);
    g.qty += r.qty;
    g.block += r.block;
  }

  // Free location: NVL/TP sheet KHÔNG có cột LGORT, MB52 có.
  // Cách phân bổ: BIN tiêu thụ MB52 theo thứ tự LGORT từ kho có nhiều nhất.
  // Mỗi LGORT, MB52 còn dư sau khi BIN "ăn" chính là Free location của LGORT đó.
  // Cách này khớp với trường hợp:
  //   - BIN cộng đúng bằng MB52 một LGORT → LGORT khác là Free 100%
  //   - BIN ít hơn tổng → các LGORT đông MB52 nhất giữ phần Free đầu tiên
  const freeCards = [];
  if (mb52List.length > 0) {
    const lgs = [...mb52ByLgort.values()].sort((a, b) => b.qty - a.qty);
    let binRemaining = totalBin;
    for (const g of lgs) {
      const consumed = Math.min(g.qty, binRemaining);
      const free = g.qty - consumed;
      binRemaining -= consumed;
      if (free > 0.0001) {
        freeCards.push({ lgort: g.lgort, qty: free, unit: g.unit });
      }
    }
  }

  // ----- Header summary -----
  let header = '';
  const totalMb52 = mb52List.reduce((s, r) => s + r.qty, 0);
  if (mb52List.length || rows.length) {
    let totalLine = '';
    if (rows.length) {
      totalLine = `Tồn theo BIN: <span class="total">${formatQty(totalBin)} ${escapeHtml(unit)}</span>`;
    }
    if (mb52List.length) {
      const lgortStr = [...mb52ByLgort.keys()].sort().join(', ');
      const mb52Cls = (totalMb52 !== totalBin) ? 'total info' : 'total';
      totalLine += (totalLine ? '<br>' : '') +
        `Tồn MB52 (${escapeHtml(lgortStr)}): <span class="${mb52Cls}">${formatQty(totalMb52)} ${escapeHtml(unit)}</span>`;
    }
    header = `<div class="summary"><span class="badge">MÃ SAP</span> <span class="key">${escapeHtml(key)}</span>` +
      (name ? ' — ' + escapeHtml(name) : '') +
      (totalLine ? '<br>' + totalLine : '') +
      '</div>';
  } else {
    // Chỉ có trong MARA hoặc BOM
    header = `<div class="summary"><span class="badge">MÃ SAP</span> <span class="key">${escapeHtml(key)}</span>` +
      (name ? ' — ' + escapeHtml(name) : '') +
      '<br><span style="color:var(--text-dim)">Không có tồn kho hiện tại</span></div>';
  }

  // ----- BIN cards -----
  let binCardsHtml = '';
  if (rows.length) {
    const groups = groupByBinAndMatnr(rows);
    binCardsHtml = groups.map(g => renderCard(g, "MATNR")).join("");
  }

  // ----- Free location cards -----
  let freeCardsHtml = '';
  if (freeCards.length) {
    freeCardsHtml =
      '<div class="section-head"><span class="section-title">Free location</span>' +
      `<span class="section-count">${freeCards.length} kho</span></div>` +
      freeCards.map(fc => renderFreeCard(fc, key, name)).join("");
  }

  // ----- BOM section -----
  let bomHtml = '';
  if (bomAsTp.length) {
    // Mã này là TP → liệt kê các NVL cấu thành (gộp trùng comp)
    bomHtml += renderBomSection(
      "📋 Cấu thành (BOM)",
      "Mã này dùng những NVL sau",
      groupBomBy(bomAsTp, 'comp'),
      'comp'
    );
  }
  if (bomAsComp.length) {
    // Mã này là NVL → liệt kê các TP sử dụng nó
    bomHtml += renderBomSection(
      "🔗 Được dùng cho (BOM)",
      "Mã này được dùng làm linh kiện cho",
      groupBomBy(bomAsComp, 'tp'),
      'tp'
    );
  }

  content.innerHTML = header + binCardsHtml + freeCardsHtml + bomHtml;
  bindBomClick();
}

    <div class="card free-loc">
      <div class="card-head">

        <span class="card-tag free">${escapeHtml(fc.lgort)}</span>

        </div>

/** Gộp BOM rows trùng key (tp hoặc comp) lại - cộng dồn qty */
function groupBomBy(rows, key) {
  const m = new Map();
  const order = [];
  for (const r of rows) {
    const k = r[key];
    if (!m.has(k)) {
      m.set(k, { ...r, qty: 0 });
      order.push(k);
    }
    m.get(k).qty += r.qty;
  }
  return order.map(k => m.get(k));
}

function renderBomSection(title, hint, items, codeKey) {
  // codeKey = 'comp' (TP → NVL components) hoặc 'tp' (NVL → TP that use it)
  const rowsHtml = items.map(b => {
    const code = b[codeKey];
    const name = codeKey === 'comp' ? b.compName : b.tpName;
    const unit = codeKey === 'comp' ? b.unit : 'PCS';   // TP unit thường là PCS
    const refTxt = (codeKey === 'comp' && b.ref) ? `<span class="ref">vị trí: ${escapeHtml(b.ref)}</span>` : '';
    return `
      <div class="bom-row" data-code="${escapeHtml(code)}">
        <div class="bom-info">
          <div class="bom-code">${escapeHtml(code)}</div>
          <div class="bom-name">${escapeHtml(name) || '(không có tên)'}</div>
        </div>
        <div class="bom-qty">
          ${formatQty(b.qty)} ${escapeHtml(unit)}
          ${refTxt}
        </div>
      </div>
    `;
  }).join("");

  return `
    <div class="section-head">
      <span class="section-title">${title}</span>
      <span class="section-count">${items.length}</span>
    </div>
    <div class="bom-card">
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px;">${hint} (tap để tra tiếp):</div>
      ${rowsHtml}
    </div>
  `;
}

function bindBomClick() {
  content.querySelectorAll(".bom-row").forEach(el => {
    el.addEventListener("click", () => {
      const code = el.getAttribute("data-code");
      if (!code) return;
      searchInput.value = code;
      renderResults(search(code));
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

/** Render kết quả dạng danh sách (BIN, fuzzy, name search) - giữ logic cũ */
function renderListResults(result) {
  const rows = result.rows.slice(0, 200);
  let header = "";
  const totalQty = rows.reduce((s, r) => s + r.qty, 0);
  const unit = rows[0]?.unit || "";

  if (result.mode === "BIN") {
    header = '<div class="summary"><span class="badge">BIN</span> <span class="key">' +
      escapeHtml(result.key) + '</span> — chứa <b>' + rows.length + '</b> mã, tổng <span class="total">' +
      formatQty(totalQty) + ' ' + escapeHtml(unit) + '</span></div>';
  } else if (result.mode === "BIN_LIKE" || result.mode === "MATNR_LIKE" || result.mode === "MIXED") {
    header = '<div class="summary">Tìm thấy <b>' + rows.length + '</b> kết quả gần đúng cho "' +
      escapeHtml(result.key) + '"</div>';
  } else if (result.mode === "NAME") {
    header = '<div class="summary">Tìm theo tên: <b>' + rows.length + '</b> kết quả</div>';
  }

  const cards = groupByBinAndMatnr(rows).map(g => renderCard(g, result.mode)).join("");
  content.innerHTML = header + cards;
}

/* Gộp các dòng có cùng BIN + cùng mã SAP (chỉ khác batch) thành 1 nhóm.
   Giữ nguyên thứ tự xuất hiện đầu tiên. */
function groupByBinAndMatnr(rows) {
  const map = new Map();
  const order = [];
  for (const r of rows) {
    const key = r.bin + "||" + r.matnr;
    if (!map.has(key)) {
      map.set(key, {
        bin: r.bin,
        matnr: r.matnr,
        name: r.name,
        type: r.type,
        unit: r.unit,
        batches: [],
      });
      order.push(key);
    }
    map.get(key).batches.push({ batch: r.batch, qty: r.qty });
  }
  return order.map(k => map.get(k));
}

function renderCard(g, mode) {
  const showBinFirst = (mode === "MATNR" || mode === "MATNR_LIKE" || mode === "NAME");
  const primary = showBinFirst ? g.bin : g.matnr;
  const secondary = showBinFirst ? g.matnr : g.bin;
  const secondaryLabel = showBinFirst ? "Mã SAP" : "BIN";

  const totalQty = g.batches.reduce((s, b) => s + b.qty, 0);
  const unit = g.unit || "";
  const multi = g.batches.length > 1;

  let body;
  if (!multi) {
    const b = g.batches[0];
    body = `
      <div class="grid">
        <div class="field">
          <span class="label">${secondaryLabel}</span>
          <span class="value">${escapeHtml(secondary)}</span>
        </div>
        <div class="field">
          <span class="label">Batch</span>
          <span class="value">${escapeHtml(b.batch) || '—'}</span>
        </div>
        <div class="field">
          <span class="label">Số lượng</span>
          <span class="value qty">${formatQty(b.qty)} ${escapeHtml(unit)}</span>
        </div>
        <div class="field">
          <span class="label">Đơn vị</span>
          <span class="value">${escapeHtml(unit) || '—'}</span>
        </div>
      </div>
    `;
  } else {
    const batchRows = g.batches.map(b => `
      <div class="batch-row">
        <span class="batch-code ${b.batch ? '' : 'empty'}">${escapeHtml(b.batch) || '(không có batch)'}</span>
        <span class="batch-qty">${formatQty(b.qty)} ${escapeHtml(unit)}</span>
      </div>
    `).join("");
    body = `
      <div class="grid">
        <div class="field">
          <span class="label">${secondaryLabel}</span>
          <span class="value">${escapeHtml(secondary)}</span>
        </div>
        <div class="field">
          <span class="label">Đơn vị</span>
          <span class="value">${escapeHtml(unit) || '—'}</span>
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <span class="label">Batch (${g.batches.length})</span>
        <div class="batch-list">${batchRows}</div>
      </div>
      <div class="batch-total">
        <span class="label">Tổng cộng</span>
        <span class="value">${formatQty(totalQty)} ${escapeHtml(unit)}</span>
      </div>
    `;
  }

  return `
    <div class="card">
      <div class="card-head">
        <div class="card-primary">${escapeHtml(primary)}</div>
        <span class="card-tag ${g.type.toLowerCase()}">${g.type}</span>
      </div>
      <div class="card-name">${escapeHtml(g.name) || '<i style="color:var(--text-dim)">(không có tên)</i>'}</div>
      ${body}
    </div>
  `;
}

function formatQty(n) {
  if (n === 0) return "0";
  return n.toLocaleString("vi-VN", { maximumFractionDigits: 2 });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* =========================================================
   Lịch sử tra cứu - lưu localStorage
   ========================================================= */
function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  } catch (e) {
    return [];
  }
}

function saveHistory(list) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  } catch (e) {}
}

function addToHistory(result) {
  if (!result || !result.key) return;
  const list = loadHistory();
  const filtered = list.filter(x => x.key !== result.key);
  filtered.unshift({
    key: result.key,
    mode: result.mode,
    count: result.rows.length,
    at: Date.now(),
  });
  saveHistory(filtered.slice(0, HISTORY_MAX));
}

function renderHistory() {
  const list = loadHistory();
  const listEl = document.getElementById("historyList");
  const clearBtn = document.getElementById("clearHistoryBtn");

  if (list.length === 0) {
    listEl.innerHTML = '<div class="history-empty"><div class="icon">📭</div>Chưa có lịch sử tra cứu</div>';
    clearBtn.disabled = true;
    return;
  }

  clearBtn.disabled = false;
  listEl.innerHTML = list.map(item => {
    // Với mode=MATNR và count=0 → có thể vẫn có MB52/BOM nên không hẳn là "không tìm thấy"
    // Đơn giản: dùng count>0 OR mode=MATNR (đã trong MARA/MB52/BOM)
    const found = item.count > 0 || item.mode === "MATNR";
    const resultText = found
      ? (item.count > 0
          ? `<span class="history-result-found">✓ ${item.count} kết quả</span>`
          : `<span class="history-result-found">✓ Mã hợp lệ</span>`)
      : `<span class="history-result-none">∅ Không tìm thấy</span>`;
    return `
      <div class="history-item" data-key="${escapeHtml(item.key)}">
        <div class="history-info">
          <div class="history-code">${escapeHtml(item.key)}</div>
          <div class="history-meta-row">${resultText}</div>
        </div>
        <span class="history-arrow">›</span>
      </div>
    `;
  }).join("");

  listEl.querySelectorAll(".history-item").forEach(el => {
    el.addEventListener("click", () => {
      const key = el.getAttribute("data-key");
      searchInput.value = key;
      renderResults(search(key));
      closeHistoryModal();
    });
  });
}

const historyModal = document.getElementById("historyModal");
document.getElementById("historyBtn").addEventListener("click", () => {
  renderHistory();
  historyModal.classList.add("open");
});
document.getElementById("closeHistory").addEventListener("click", closeHistoryModal);
historyModal.addEventListener("click", e => {
  if (e.target === historyModal) closeHistoryModal();
});
function closeHistoryModal() {
  historyModal.classList.remove("open");
}
document.getElementById("clearHistoryBtn").addEventListener("click", () => {
  if (!confirm("Xóa toàn bộ lịch sử tra cứu?")) return;
  saveHistory([]);
  renderHistory();
});

const searchInput = document.getElementById("searchInput");
let debounceTimer;
searchInput.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    renderResults(search(searchInput.value));
  }, 200);
});
searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    clearTimeout(debounceTimer);
    renderResults(search(searchInput.value));
    searchInput.blur();
  }
});

function getQrBoxSize(viewportWidth, viewportHeight) {
  const minDim = Math.min(viewportWidth, viewportHeight);
  const size = Math.floor(minDim * 0.75);
  return { width: size, height: Math.floor(size * 0.6) };
}

scanBtn.addEventListener("click", async () => {
  scanModal.classList.add("open");

  if (!scanner) {
    scanner = new Html5Qrcode("reader", {
      formatsToSupport: PREFERRED_FORMATS,
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
      verbose: false,
    });
  }

  try {
    await scanner.start(
      { facingMode: "environment" },
      {
        fps: 25,
        qrbox: getQrBoxSize,
        aspectRatio: 1.0,
        disableFlip: false,
        videoConstraints: {
          facingMode: "environment",
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          advanced: [{ focusMode: "continuous" }]
        }
      },
      onScanSuccess,
      () => {}
    );

    currentTrack = scanner.getRunningTrackCameraCapabilities
      ? scanner.getRunningTrackCameraCapabilities()
      : null;

    setTimeout(checkTorchSupport, 500);
  } catch (e) {
    alert("Không mở được camera: " + e.message);
    scanModal.classList.remove("open");
  }
});

function onScanSuccess(decoded) {
  if (navigator.vibrate) navigator.vibrate(120);
  playBeep();

  const processed = extractSapCode(decoded);

  searchInput.value = processed.code;
  showScanInfo(decoded, processed);

  renderResults(search(processed.code));
  closeScannerModal();
}

function extractSapCode(raw) {
  const s = String(raw).trim();

  // Tiền xử lý: bỏ tiền tố "NNC" nếu có (3 ký tự cố định ở QR công ty)
  const stripped = s.replace(/^NNC/i, "");

  // Layer 1: Mã NVL có format chuẩn L + 11 chữ số → match chính xác bằng regex
  const nvlMatch = stripped.match(/L\d{11}/);
  if (nvlMatch) {
    return {
      code: nvlMatch[0].toUpperCase(),
      truncated: s !== nvlMatch[0],
      method: "NVL pattern",
      original: s,
    };
  }

  // Layer 2: Mã TP đa dạng độ dài (5-12 ký tự). Thử match từ dài đến ngắn,
  // validate với database (MARA + tp + nvl) để tìm mã có thật
  if (stripped.match(/^N/i)) {
    const allCodes = new Set([
      ...DATA.tp.map(r => r.matnr),
      ...DATA.nvl.map(r => r.matnr),
      ...DATA.mara.map(r => r.matnr),    // mở rộng: dùng cả master data
    ]);
    for (let len = Math.min(stripped.length, 18); len >= 5; len--) {
      const candidate = stripped.substring(0, len).toUpperCase();
      if (allCodes.has(candidate)) {
        return {
          code: candidate,
          truncated: s !== candidate,
          method: "DB match",
          original: s,
        };
      }
    }
    // Không tìm thấy trong database → dùng regex bắt N + 4-17 ký tự ở đầu chuỗi đã strip
    const tpMatch = stripped.match(/^(N[A-Z0-9\-]{4,17})/i);
    if (tpMatch) {
      return {
        code: tpMatch[1].toUpperCase(),
        truncated: s !== tpMatch[1],
        method: "TP pattern (no match)",
        original: s,
      };
    }
  }

  // Layer 3: Fallback - chuỗi >= 15 ký tự → cắt 3 đầu + 12 sau
  if (s.length >= 15) {
    return {
      code: s.substring(3, 15).toUpperCase(),
      truncated: true,
      method: "3+12",
      original: s,
    };
  }

  // Layer 4: Chuỗi ngắn → giữ nguyên (có thể là BIN)
  return {
    code: s.toUpperCase(),
    truncated: false,
    method: "as-is",
    original: s,
  };
}

function showScanInfo(original, processed) {
  let info = document.getElementById("scanInfo");
  if (!info) {
    info = document.createElement("div");
    info.id = "scanInfo";
    info.className = "scan-info";
    document.querySelector(".header").appendChild(info);
  }

  if (processed.truncated) {
    info.innerHTML = '<span class="scan-info-label">Đã quét:</span> ' +
      '<span class="scan-info-orig">' + escapeHtml(processed.original) + '</span>' +
      '<span class="scan-info-arrow"> → </span>' +
      '<span class="scan-info-code">' + escapeHtml(processed.code) + '</span>';
  } else {
    info.innerHTML = '<span class="scan-info-label">Đã quét:</span> ' +
      '<span class="scan-info-code">' + escapeHtml(processed.code) + '</span>';
  }
  info.classList.add("show");

  clearTimeout(window._scanInfoTimer);
  window._scanInfoTimer = setTimeout(() => {
    info.classList.remove("show");
  }, 4000);
}

let audioCtx = null;
function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 1200;
    gain.gain.value = 0.15;
    osc.start();
    osc.stop(audioCtx.currentTime + 0.08);
  } catch (e) {}
}

async function checkTorchSupport() {
  try {
    const settings = scanner.getRunningTrackSettings();
    if (settings && "torch" in settings) {
      torchBtn.style.display = "flex";
    }
  } catch (e) {
    try {
      const caps = scanner.getRunningTrackCameraCapabilities();
      if (caps && caps.torchFeature && caps.torchFeature().isSupported()) {
        torchBtn.style.display = "flex";
      }
    } catch (e2) {}
  }
}

torchBtn.addEventListener("click", async () => {
  if (!scanner) return;
  try {
    torchOn = !torchOn;
    try {
      const caps = scanner.getRunningTrackCameraCapabilities();
      if (caps && caps.torchFeature) {
        await caps.torchFeature().apply(torchOn);
      }
    } catch (e) {
      await scanner.applyVideoConstraints({ advanced: [{ torch: torchOn }] });
    }
    torchBtn.textContent = torchOn ? "🔦 Tắt" : "🔦";
    torchBtn.classList.toggle("on", torchOn);
  } catch (e) {
    console.warn("Torch toggle failed:", e);
  }
});

closeScan.addEventListener("click", closeScannerModal);
function closeScannerModal() {
  if (scanner && scanner.isScanning) {
    scanner.stop().catch(() => {});
  }
  scanModal.classList.remove("open");
  torchOn = false;
  torchBtn.textContent = "🔦";
  torchBtn.classList.remove("on");
}

document.getElementById("refreshBtn").addEventListener("click", () => loadData(true));
loadData();
</script>
</body>
