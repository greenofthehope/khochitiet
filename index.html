<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Tra cứu tồn kho</title>

<!-- SheetJS để parse Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<!-- html5-qrcode cho quét barcode/QR -->
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
  :root {
    --bg: #0f172a;
    --bg-elev: #1e293b;
    --bg-card: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #fbbf24;
    --accent-hover: #f59e0b;
    --ok: #10b981;
    --warn: #ef4444;
    --radius: 14px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px; line-height: 1.45; min-height: 100vh; }

  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg); padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .title { font-size: 18px; font-weight: 700; margin: 0 0 10px;
    display: flex; align-items: center; gap: 10px; }
  .title .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dim); transition: background .3s; }
  .title .dot.ok { background: var(--ok); }
  .title .dot.warn { background: var(--warn); }

  .search-row { display: flex; gap: 8px; }
  .input {
    flex: 1; padding: 14px 14px; font-size: 17px;
    background: var(--bg-elev); color: var(--text);
    border: 2px solid var(--border); border-radius: var(--radius);
    outline: none; transition: border-color .15s;
    text-transform: uppercase;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text-dim); text-transform: none; }

  .btn-scan {
    width: 52px; height: 52px; flex-shrink: 0;
    background: var(--accent); color: #1a1a1a; border: none;
    border-radius: var(--radius); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-scan:active { background: var(--accent-hover); }

  .meta {
    padding: 8px 16px; font-size: 12px; color: var(--text-dim);
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn-refresh { background: none; border: 1px solid var(--border);
    color: var(--text-dim); padding: 4px 10px; border-radius: 8px;
    font-size: 12px; cursor: pointer; }
  .btn-refresh:active { background: var(--bg-elev); }

  .content { padding: 8px 16px 80px; }

  .status {
    text-align: center; padding: 40px 20px; color: var(--text-dim);
  }
  .status.loading::after {
    content: ""; display: inline-block; width: 14px; height: 14px;
    margin-left: 8px; border: 2px solid var(--text-dim);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
    margin-bottom: 10px; font-size: 14px;
  }
  .summary .badge {
    display: inline-block; padding: 2px 8px; border-radius: 6px;
    background: var(--accent); color: #1a1a1a; font-weight: 700;
    font-size: 12px; margin-right: 6px;
  }
  .summary .key { color: var(--accent); font-weight: 700; }
  .summary .total { color: var(--ok); font-weight: 700; }

  .card {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    margin-bottom: 10px;
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; gap: 10px;
  }
  .card-primary {
    font-size: 18px; font-weight: 700; color: var(--accent);
    word-break: break-all;
  }
  .card-tag {
    font-size: 11px; padding: 3px 8px; border-radius: 6px;
    background: var(--bg-card); color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .5px; flex-shrink: 0;
  }
  .card-tag.tp { background: #064e3b; color: #6ee7b7; }
  .card-tag.nvl { background: #1e3a8a; color: #93c5fd; }

  .card-name { font-size: 14px; color: var(--text); margin-bottom: 10px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
  .field { font-size: 13px; }
  .field .label { display: block; color: var(--text-dim);
    font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
  .field .value { color: var(--text); font-weight: 600; word-break: break-all; }
  .field .value.qty { color: var(--ok); font-size: 16px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--text-dim); }
  .empty .icon { font-size: 40px; margin-bottom: 10px; opacity: .5; }

  /* Modal quét */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.92);
    z-index: 100; display: none; flex-direction: column;
  }
  .modal.open { display: flex; }
  .modal-head {
    padding: 14px; display: flex; justify-content: space-between; align-items: center;
    color: white; font-weight: 600;
  }
  .modal-close { background: none; border: none; color: white;
    font-size: 28px; cursor: pointer; padding: 0 8px; }
  #reader { flex: 1; }
  .modal-hint { padding: 14px; text-align: center; color: white; font-size: 13px; }
</style>
</head>
<body>

<div class="header">
  <h1 class="title"><span class="dot" id="statusDot"></span>Tra cứu tồn kho</h1>
  <div class="search-row">
    <input id="searchInput" class="input" type="text" inputmode="text"
           placeholder="Nhập BIN hoặc mã SAP..." autocomplete="off" autocorrect="off" autocapitalize="characters">
    <button class="btn-scan" id="scanBtn" aria-label="Quét mã">📷</button>
  </div>
</div>

<div class="meta">
  <span id="metaText">Đang tải dữ liệu...</span>
  <button class="btn-refresh" id="refreshBtn">↻ Làm mới</button>
</div>

<div class="content" id="content">
  <div class="status loading">Đang tải dữ liệu từ OneDrive</div>
</div>

<div class="modal" id="scanModal">
  <div class="modal-head">
    <span>Quét mã BIN / SAP</span>
    <button class="modal-close" id="closeScan">×</button>
  </div>
  <div id="reader"></div>
  <div class="modal-hint">Đưa mã vạch / QR vào khung hình</div>
</div>

<script>
/* =========================================================
   CẤU HÌNH — chỉ cần sửa 1 dòng dưới đây:
   Dán link OneDrive share của file Ton_kho_chi_tiet.xlsx
   ========================================================= */
const ONEDRIVE_SHARE_URL = "https://github.com/greenofthehope/khochitiet/blob/main/Ton_kho_chi_tiet.xlsx";

/* Cache local 5 phút để không gọi OneDrive liên tục */
const CACHE_KEY = "ton_kho_cache_v1";
const CACHE_TTL_MS = 5 * 60 * 1000;

/* =========================================================
   Hàm chuyển share link OneDrive thành direct download link
   Hỗ trợ cả OneDrive Personal và Business
   ========================================================= */
function toDownloadUrl(shareUrl) {
  if (!shareUrl || shareUrl.includes("DÁN_LINK")) return null;

  // OneDrive Business / SharePoint: thêm ?download=1
  if (shareUrl.includes("sharepoint.com") || shareUrl.includes("-my.sharepoint")) {
    const sep = shareUrl.includes("?") ? "&" : "?";
    return shareUrl + sep + "download=1";
  }
  // OneDrive Personal (1drv.ms hoặc onedrive.live.com): dùng API encode
  if (shareUrl.includes("1drv.ms") || shareUrl.includes("onedrive.live.com")) {
    const b64 = btoa(shareUrl).replace(/=+$/, "").replace(/\//g, "_").replace(/\+/g, "-");
    return "https://api.onedrive.com/v1.0/shares/u!" + b64 + "/root/content";
  }
  // Mặc định: nối ?download=1
  return shareUrl + (shareUrl.includes("?") ? "&" : "?") + "download=1";
}

/* =========================================================
   Tải & parse Excel
   ========================================================= */
let DATA = { nvl: [], tp: [], loadedAt: null };
const statusDot = document.getElementById("statusDot");
const metaText = document.getElementById("metaText");
const content = document.getElementById("content");

async function loadData(force = false) {
  // Thử cache trước
  if (!force) {
    try {
      const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
      if (cached && Date.now() - cached.loadedAt < CACHE_TTL_MS) {
        DATA = cached;
        setStatus("ok", "Dữ liệu: " + formatTime(cached.loadedAt) + " (cache)");
        renderInitial();
        return;
      }
    } catch (e) {}
  }

  setStatus("loading", "Đang tải dữ liệu từ OneDrive...");
  content.innerHTML = '<div class="status loading">Đang tải dữ liệu từ OneDrive</div>';

  const url = toDownloadUrl(ONEDRIVE_SHARE_URL);
  if (!url) {
    setStatus("warn", "Chưa cấu hình link OneDrive");
    content.innerHTML = '<div class="empty"><div class="icon">⚠️</div>Mở file HTML này bằng editor và sửa biến <b>ONEDRIVE_SHARE_URL</b> ở đầu thẻ &lt;script&gt;</div>';
    return;
  }

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const buf = await resp.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array" });

    const parseSheet = (name) => {
      if (!wb.Sheets[name]) return [];
      return XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: "" })
        .map(r => ({
          bin: String(r.LGPLA || "").trim().toUpperCase(),
          matnr: String(r.MATNR || "").trim().toUpperCase(),
          name: String(r.MAKTX || "").trim(),
          batch: String(r.CHARG || "").trim(),
          qty: Number(r.GESME) || 0,
          unit: String(r.MEINS || "").trim(),
        }))
        .filter(r => r.bin && r.matnr);
    };

    DATA = {
      nvl: parseSheet("NVL"),
      tp: parseSheet("TP"),
      loadedAt: Date.now(),
    };
    localStorage.setItem(CACHE_KEY, JSON.stringify(DATA));
    setStatus("ok", "Cập nhật: " + formatTime(DATA.loadedAt) +
      " · " + (DATA.nvl.length + DATA.tp.length) + " dòng");
    renderInitial();
  } catch (err) {
    setStatus("warn", "Lỗi tải dữ liệu");
    content.innerHTML = '<div class="empty"><div class="icon">❌</div>Không tải được file.<br><small style="opacity:.7">' +
      err.message + '</small><br><br>Kiểm tra: link share đã đặt "Anyone with the link" chưa?</div>';
  }
}

function setStatus(kind, text) {
  statusDot.className = "dot " + (kind === "ok" ? "ok" : kind === "warn" ? "warn" : "");
  metaText.textContent = text;
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString("vi-VN", { hour: "2-digit", minute: "2-digit" }) +
    " " + d.toLocaleDateString("vi-VN");
}

/* =========================================================
   Logic tìm kiếm
   ========================================================= */
function search(query) {
  const q = query.trim().toUpperCase();
  if (!q) return null;

  const all = [
    ...DATA.nvl.map(r => ({ ...r, type: "NVL" })),
    ...DATA.tp.map(r => ({ ...r, type: "TP" })),
  ];

  // Khớp BIN chính xác trước
  const binExact = all.filter(r => r.bin === q);
  if (binExact.length) return { mode: "BIN", key: q, rows: binExact };

  // Khớp MATNR chính xác
  const matExact = all.filter(r => r.matnr === q);
  if (matExact.length) return { mode: "MATNR", key: q, rows: matExact };

  // Khớp prefix (gõ chưa hết)
  const binPrefix = all.filter(r => r.bin.startsWith(q));
  const matPrefix = all.filter(r => r.matnr.startsWith(q));

  if (binPrefix.length && !matPrefix.length) return { mode: "BIN_LIKE", key: q, rows: binPrefix };
  if (matPrefix.length && !binPrefix.length) return { mode: "MATNR_LIKE", key: q, rows: matPrefix };
  if (binPrefix.length || matPrefix.length) {
    return { mode: "MIXED", key: q, rows: [...binPrefix, ...matPrefix] };
  }

  // Tìm trong tên (fallback)
  const inName = all.filter(r => r.name.toUpperCase().includes(q));
  if (inName.length) return { mode: "NAME", key: q, rows: inName };

  return { mode: "NONE", key: q, rows: [] };
}

/* =========================================================
   Render
   ========================================================= */
function renderInitial() {
  content.innerHTML = '<div class="empty"><div class="icon">🔍</div>Nhập <b>số BIN</b> (vd: CK013-06-3) hoặc <b>mã SAP</b> (vd: L21210419013)<br><br>Hoặc nhấn 📷 để quét mã vạch</div>';
}

function renderResults(result) {
  if (!result) { renderInitial(); return; }

  if (result.mode === "NONE") {
    content.innerHTML = '<div class="empty"><div class="icon">∅</div>Không tìm thấy "<b>' + escapeHtml(result.key) + '</b>"</div>';
    return;
  }

  const rows = result.rows.slice(0, 200); // giới hạn render
  let header = "";
  const totalQty = rows.reduce((s, r) => s + r.qty, 0);
  const unit = rows[0]?.unit || "";

  if (result.mode === "BIN") {
    header = '<div class="summary"><span class="badge">BIN</span> <span class="key">' +
      escapeHtml(result.key) + '</span> — chứa <b>' + rows.length + '</b> mã, tổng <span class="total">' +
      formatQty(totalQty) + ' ' + escapeHtml(unit) + '</span></div>';
  } else if (result.mode === "MATNR") {
    header = '<div class="summary"><span class="badge">MÃ SAP</span> <span class="key">' +
      escapeHtml(result.key) + '</span> — ' + escapeHtml(rows[0].name) +
      '<br>Có ở <b>' + rows.length + '</b> BIN, tổng <span class="total">' +
      formatQty(totalQty) + ' ' + escapeHtml(unit) + '</span></div>';
  } else if (result.mode === "BIN_LIKE" || result.mode === "MATNR_LIKE" || result.mode === "MIXED") {
    header = '<div class="summary">Tìm thấy <b>' + rows.length + '</b> kết quả gần đúng cho "' +
      escapeHtml(result.key) + '"</div>';
  } else if (result.mode === "NAME") {
    header = '<div class="summary">Tìm theo tên: <b>' + rows.length + '</b> kết quả</div>';
  }

  const cards = rows.map(r => renderCard(r, result.mode)).join("");
  content.innerHTML = header + cards;
}

function renderCard(r, mode) {
  // Khi tìm theo BIN: primary là MATNR (vì người dùng đã biết BIN, cần biết có mã gì)
  // Khi tìm theo MATNR: primary là BIN (vì người dùng đã biết mã, cần biết ở BIN nào)
  const showBinFirst = (mode === "MATNR" || mode === "MATNR_LIKE" || mode === "NAME");
  const primary = showBinFirst ? r.bin : r.matnr;
  const secondary = showBinFirst ? r.matnr : r.bin;
  const secondaryLabel = showBinFirst ? "Mã SAP" : "BIN";

  return `
    <div class="card">
      <div class="card-head">
        <div class="card-primary">${escapeHtml(primary)}</div>
        <span class="card-tag ${r.type.toLowerCase()}">${r.type}</span>
      </div>
      <div class="card-name">${escapeHtml(r.name) || '<i style="color:var(--text-dim)">(không có tên)</i>'}</div>
      <div class="grid">
        <div class="field">
          <span class="label">${secondaryLabel}</span>
          <span class="value">${escapeHtml(secondary)}</span>
        </div>
        <div class="field">
          <span class="label">Batch</span>
          <span class="value">${escapeHtml(r.batch) || '—'}</span>
        </div>
        <div class="field">
          <span class="label">Số lượng</span>
          <span class="value qty">${formatQty(r.qty)} ${escapeHtml(r.unit)}</span>
        </div>
        <div class="field">
          <span class="label">Đơn vị</span>
          <span class="value">${escapeHtml(r.unit) || '—'}</span>
        </div>
      </div>
    </div>
  `;
}

function formatQty(n) {
  if (n === 0) return "0";
  return n.toLocaleString("vi-VN", { maximumFractionDigits: 2 });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* =========================================================
   Sự kiện input — debounce 200ms
   ========================================================= */
const searchInput = document.getElementById("searchInput");
let debounceTimer;
searchInput.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    renderResults(search(searchInput.value));
  }, 200);
});
searchInput.addEventListener("keydown", e => {
  if (e.key === "Enter") {
    clearTimeout(debounceTimer);
    renderResults(search(searchInput.value));
    searchInput.blur();
  }
});

/* =========================================================
   Quét camera
   ========================================================= */
const scanModal = document.getElementById("scanModal");
const scanBtn = document.getElementById("scanBtn");
const closeScan = document.getElementById("closeScan");
let scanner = null;

scanBtn.addEventListener("click", async () => {
  scanModal.classList.add("open");
  if (!scanner) scanner = new Html5Qrcode("reader");
  try {
    await scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      decoded => {
        searchInput.value = decoded;
        renderResults(search(decoded));
        closeScannerModal();
      },
      () => {} // bỏ qua lỗi mỗi frame
    );
  } catch (e) {
    alert("Không mở được camera: " + e.message);
    scanModal.classList.remove("open");
  }
});

closeScan.addEventListener("click", closeScannerModal);
function closeScannerModal() {
  if (scanner && scanner.isScanning) {
    scanner.stop().catch(() => {});
  }
  scanModal.classList.remove("open");
}

/* =========================================================
   Refresh
   ========================================================= */
document.getElementById("refreshBtn").addEventListener("click", () => loadData(true));

/* =========================================================
   Khởi động
   ========================================================= */
loadData();
</script>
</body>
</html>
